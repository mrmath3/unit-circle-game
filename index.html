<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Circle Game</title>
  <meta name="description" content="Practice locating special angles on the unit circle. A 30-second click-based math game for high school students.">

  <!--
    MathJax — renders LaTeX prompts.
    Must stay in <head> so it's available when game.js calls typesetPromise().
  -->
  <script
    id="MathJax-script"
    async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
  ></script>


  <!-- Vite dev: served from /src/main.js. Production: Vite replaces this with hashed bundles. -->
  <script type="module" crossorigin src="/unit-circle-game/assets/index-BomwJ04p.js"></script>
  <link rel="stylesheet" crossorigin href="/unit-circle-game/assets/index-DHk_BwXp.css">
</head>
<body>

  <h2>Location of Radians</h2>

  <!-- ── Auth bar ──────────────────────────────────────────────────────────── -->
  <div id="authBar">
    <!--
      Google Sign-In button rendered here by auth.js → initAuth().
      Hidden once signed in; sign-out button revealed instead.
    -->
    <div id="googleSignInBtn"></div>
    <span id="authUserInfo"></span>
    <button id="signOutBtn" type="button" style="display:none;">Sign Out</button>
  </div>

  <!-- ── Game area ──────────────────────────────────────────────────────────── -->
  <div id="prompt"></div>

  <!--
    SVG is injected here by game.js (Vite ?raw import of unit-circle.svg).
    The JS then appends clickable <circle> elements into the injected SVG.
  -->
  <div id="svgWrapper"></div>

  <audio id="ding" src="/unit-circle-game/assets/correct-ding-BJZRVUFV.mp3" preload="auto"></audio>
  <audio id="buzz" src="/unit-circle-game/assets/wrong-buzz-B-ACVDp0.mp3"  preload="auto"></audio>

  <div id="startMsg">Click an angle to start the timer</div>
  <div id="timer"></div>
  <div id="feedback"></div>
  <button id="resetBtn" type="button">Reset Game</button>
  <!-- ── Public leaderboard ─────────────────────────────────────────────────── -->
  <div class="leaderboard-section">
    <h3>Public Leaderboard</h3>
    <div id="periodTabs">
      <button id="tabAllTime" class="active" type="button">All Time</button>
      <button id="tabMonthly" type="button">This Month</button>
    </div>
    <div id="publicLeaderboardStatus">Sign in to submit your score to the public board.</div>
    <table id="publicScores">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th># Correct</th>
          <th>Accuracy</th>
          <th>Games</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</body>
</html>
